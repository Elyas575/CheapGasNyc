            "price_type": "Cash",
            "reported_by": "gassingmeup",
            "reported_ago": "1 Day Ago"
          }
        ];

        // Sort stations by price (lowest first)
        const sortedStations = [...gasStations].sort((a, b) => {
          const priceA = parseFloat(a.price.replace('$', ''));
          const priceB = parseFloat(b.price.replace('$', ''));
          return priceA - priceB;
        });

        // Render station rows
        function renderStations() {
          const container = document.getElementById('station-list');
          container.innerHTML = '';

          sortedStations.forEach((station) => {
            const addressStr = station.address.street + ', ' + station.address.city + ', ' + station.address.state;

            // Build a readable time-ago display
            let timeClass = 'text-on-surface-variant';
            if (station.reported_ago.toLowerCase().includes('hour') || station.reported_ago.toLowerCase().includes('minute')) {
              timeClass = 'text-secondary font-bold';
            }

            const row = document.createElement('div');
            row.className = 'flex items-center border-b border-outline-variant py-row-padding-y px-row-padding-x hover:bg-surface-container transition-colors cursor-pointer group';
            row.innerHTML = `
              <div class="flex-none w-24">
                <div class="font-price-display-mobile text-price-display-mobile text-primary group-hover:text-secondary transition-colors">${station.price}</div>
              </div>
              <div class="flex-grow min-w-0 px-4">
                <h3 class="font-station-name text-station-name truncate leading-tight">${station.name}</h3>
                <div class="flex items-center gap-2 mt-0.5">
                  <span class="font-metadata-sm text-metadata-sm text-outline">${station.price_type}</span>
                  <span class="w-1 h-1 bg-outline-variant rounded-full"></span>
                  <span class="font-metadata-sm text-metadata-sm ${timeClass}">${station.reported_ago}</span>
                </div>
                <p class="font-body-md text-on-surface-variant text-xs truncate">${addressStr}</p>
              </div>
              <a href="${station.url}" target="_blank" class="flex-none p-2 rounded-lg border border-outline-variant text-outline hover:border-secondary hover:text-secondary active:scale-95 transition-all">
                <span class="material-symbols-outlined">chevron_right</span>
              </a>
            `;
            container.appendChild(row);
          });

          // Price pulse effect on load
          document.querySelectorAll('.font-price-display-mobile').forEach((el, index) => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(4px)';
            setTimeout(() => {
              el.style.transition = 'all 0.4s ease-out';
              el.style.opacity = '1';
              el.style.transform = 'translateY(0)';
            }, 100 * index);
          });
        }

        renderStations();

        // Simple Micro-interactions
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('active-ring');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('active-ring');
            });
        });
